name: Sync Monumetric ads.txt

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ads.txt from Monumetric
        run: |
          curl -fsSL "https://monu.delivery/adstxt/0/c/07d613-c796-4eac-978c-7029566ea884.txt" -o ads.txt.new

      - name: Check if changed
        id: check
        run: |
          if ! diff -q ads.txt ads.txt.new > /dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            mv ads.txt.new ads.txt
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            rm ads.txt.new
          fi

      - name: Commit updated ads.txt
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ads.txt
          git commit -m "chore: sync Monumetric ads.txt"
          git push

      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: npm install

      - name: Build site
        if: steps.check.outputs.changed == 'true'
        run: npm run build

      - name: Copy files to dist
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p dist
          cp -r games dist/games
          cp -r assets dist/assets
          cp -r important-pages dist/important-pages
          rsync -av --delete data/ dist/data/
          cp index.html dist/index.html
          cp *.html dist/
          cp ads.txt dist/ads.txt
          cp sitemap.xml dist/sitemap.xml
          cp robots.txt dist/robots.txt
          cp google0d95473435a7c986.html dist/google0d95473435a7c986.html
          cp .nojekyll dist/.nojekyll

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          clean: false
