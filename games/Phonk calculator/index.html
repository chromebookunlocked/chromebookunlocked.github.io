<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHONKY CALCULATOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Black+Ops+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --btn-default: #1c1c1c;
      --btn-hover: #272727;
      --op-bg: #1a1000;
      --op-color: #ff6b00;
      --eq-bg: #12002a;
      --eq-color: #a855f7;
      --clr-bg: #1a0000;
      --clr-color: #ff2244;
      --util-bg: #141414;
      --util-color: #888;
      --display-text: #e8e8e8;
      --glow-purple: #a855f7;
      --glow-orange: #ff6b00;
      --glow-red: #ff2244;
    }

    html, body {
      width: 100%; height: 100%;
      background: #050508;
      background-image:
        radial-gradient(ellipse 70% 50% at 25% 65%, rgba(168,85,247,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 75% 35%, rgba(255,107,0,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 45% 35% at 50% 10%, rgba(255,34,68,0.05) 0%, transparent 55%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      user-select: none;
    }

    /* ── SCANLINES ── */
    #scanlines {
      position: fixed; inset: 0; z-index: 9;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px
      );
    }

    /* ── VIGNETTE ── */
    #vignette {
      position: fixed; inset: 0; z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
      transition: background 0.6s ease;
    }
    #vignette.intense {
      background: radial-gradient(ellipse at center, transparent 10%, rgba(0,0,0,0.95) 100%);
    }

    /* ── FLASH ── */
    #flash-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: #fff; pointer-events: none; opacity: 0;
    }
    #flash-overlay.firing { animation: drop-flash 0.35s ease-out forwards; }

    /* ── CALCULATOR ── */
    #calculator {
      position: relative; z-index: 10;
      width: 340px;
      background: rgba(5,4,12,0.94);
      border: 1px solid rgba(255,255,255,0.05);
      border-top-color: rgba(255,255,255,0.12);
      border-radius: 8px;
      box-shadow:
        0 0 0 1px #000,
        0 0 55px rgba(168,85,247,0.22),
        0 0 120px rgba(168,85,247,0.08),
        0 30px 80px rgba(0,0,0,0.95);
      overflow: hidden;
      backdrop-filter: blur(32px) saturate(1.5);
      -webkit-backdrop-filter: blur(32px) saturate(1.5);
    }
    /* Deeper, more concentrated phonk blobs */
    #calculator::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 15% 92%, rgba(168,85,247,0.32) 0%, transparent 38%),
        radial-gradient(circle at 85% 12%, rgba(255,90,0,0.22) 0%, transparent 36%),
        radial-gradient(circle at 48% 55%, rgba(255,22,55,0.12) 0%, transparent 34%);
      pointer-events: none; z-index: 0;
    }

    #calc-header {
      position: relative; z-index: 1;
      text-align: center; padding: 10px 0 8px;
      font-family: 'Black Ops One', sans-serif;
      font-size: 11px; letter-spacing: 5px;
      color: rgba(255,255,255,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-shadow:
        0 0 6px  rgba(168,85,247,1),
        0 0 18px rgba(168,85,247,0.75),
        0 0 40px rgba(168,85,247,0.40),
        0 0 80px rgba(168,85,247,0.15);
      background: rgba(0,0,0,0.25);
    }

    #display {
      background: rgba(0,0,0,0.72); padding: 18px 20px 12px;
      min-height: 110px;
      display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      position: relative; overflow: hidden; z-index: 1;
    }

    #expression { font-size: 13px; color: #444; min-height: 18px; text-align: right; margin-bottom: 4px; letter-spacing: 1px; }

    #current-value {
      font-size: 3rem; color: var(--display-text);
      text-align: right; line-height: 1; letter-spacing: -1px;
      transition: font-size 0.1s ease;
      text-shadow: 0 0 20px rgba(168,85,247,0.3);
    }
    #current-value.pulsing { animation: value-pulse 0.5s ease-in-out infinite; color: #444; }

    #tension-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: #111; opacity: 0; transition: opacity 0.3s;
    }
    #tension-bar.active { opacity: 1; }
    #tension-fill { height: 100%; width: 0%; background: var(--glow-purple); border-radius: 0 2px 2px 0; }
    #tension-bar.active #tension-fill { animation: tension-grow var(--tension-duration, 10s) linear forwards; }

    /* ── BUTTONS ── */
    #buttons {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: rgba(0,0,0,0.55); padding: 3px;
      position: relative; z-index: 1;
    }
    .btn {
      /* Dark smoked glass — shows through to the blobs below */
      background: rgba(8,6,18,0.74);
      border: 1px solid rgba(255,255,255,0.055);
      border-top-color: rgba(255,255,255,0.09);
      border-bottom-color: rgba(0,0,0,0.6);
      color: rgba(205,205,220,0.88);
      font-family: 'Share Tech Mono', monospace; font-size: 1.3rem; font-weight: bold;
      padding: 0; height: 72px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; position: relative; overflow: hidden;
      border-radius: 3px;
      backdrop-filter: blur(14px) saturate(1.5);
      -webkit-backdrop-filter: blur(14px) saturate(1.5);
      box-shadow:
        0 2px 6px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.07),
        inset 0 -1px 0 rgba(0,0,0,0.4);
      transition: box-shadow 0.38s ease, background 0.38s ease,
                  border-color 0.38s ease, transform 0.05s ease;
    }
    /* Thin top edge highlight — the only "glass" accent */
    .btn::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,0.10);
      pointer-events: none; z-index: 1;
    }
    /* Press ripple layer */
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.12) 0%, transparent 65%);
      opacity: 0; transition: opacity 0.38s ease;
      border-radius: 2px; z-index: 2;
    }
    .btn:hover {
      background: rgba(18,14,34,0.80);
      border-top-color: rgba(255,255,255,0.14);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }
    .btn:active { transform: scale(0.95); }

    /* ── Number/dot/zero: CYAN glow ── */
    .btn:not(.operator):not(.equals):not(.clear):not(.util):active {
      background: rgba(0,195,240,0.22);
      border-color: rgba(0,195,240,0.48);
      border-top-color: rgba(0,210,255,0.62);
      box-shadow:
        0 0 20px rgba(0,195,240,0.68),
        0 0 48px rgba(0,195,240,0.22),
        inset 0 0 12px rgba(0,195,240,0.18),
        inset 0 1px 0 rgba(0,210,255,0.28);
      transition: box-shadow 0s, background 0s, border-color 0s, transform 0.05s;
    }
    .btn:not(.operator):not(.equals):not(.clear):not(.util):active::after { opacity: 1; }

    /* ── Operators: ORANGE glow ── */
    .btn.operator {
      background: rgba(28,12,0,0.76);
      border-color: rgba(255,100,0,0.14);
      border-top-color: rgba(255,130,20,0.20);
      color: var(--op-color);
    }
    .btn.operator:hover {
      background: rgba(38,18,0,0.80);
      border-top-color: rgba(255,130,20,0.30);
    }
    .btn.operator:active {
      background: rgba(255,100,0,0.28);
      border-color: rgba(255,100,0,0.58);
      border-top-color: rgba(255,150,30,0.76);
      box-shadow:
        0 0 22px rgba(255,100,0,0.75),
        0 0 52px rgba(255,100,0,0.28),
        inset 0 0 14px rgba(255,100,0,0.22),
        inset 0 1px 0 rgba(255,150,30,0.32);
      transition: box-shadow 0s, background 0s, border-color 0s, transform 0.05s;
    }
    .btn.operator:active::after { opacity: 1; }

    /* ── Equals: PURPLE glow ── */
    .btn.equals {
      background: rgba(18,6,42,0.78);
      border-color: rgba(168,85,247,0.18);
      border-top-color: rgba(190,115,255,0.28);
      color: var(--eq-color); font-size: 1.6rem;
    }
    .btn.equals:hover {
      background: rgba(28,10,58,0.82);
      border-top-color: rgba(200,135,255,0.40);
    }
    .btn.equals:active {
      background: rgba(168,85,247,0.35);
      border-color: rgba(168,85,247,0.68);
      border-top-color: rgba(210,155,255,0.88);
      box-shadow:
        0 0 28px rgba(168,85,247,0.85),
        0 0 62px rgba(168,85,247,0.30),
        inset 0 0 18px rgba(168,85,247,0.26),
        inset 0 1px 0 rgba(210,155,255,0.38);
      transition: box-shadow 0s, background 0s, border-color 0s, transform 0.05s;
    }
    .btn.equals:active::after { opacity: 1; }

    /* ── Clear: RED glow ── */
    .btn.clear {
      background: rgba(22,4,8,0.76);
      border-color: rgba(255,30,60,0.14);
      border-top-color: rgba(255,70,90,0.22);
      color: var(--clr-color);
    }
    .btn.clear:hover {
      background: rgba(32,6,12,0.80);
      border-top-color: rgba(255,70,90,0.33);
    }
    .btn.clear:active {
      background: rgba(255,28,60,0.28);
      border-color: rgba(255,28,60,0.58);
      border-top-color: rgba(255,80,100,0.78);
      box-shadow:
        0 0 22px rgba(255,28,60,0.72),
        0 0 52px rgba(255,28,60,0.25),
        inset 0 0 14px rgba(255,28,60,0.20),
        inset 0 1px 0 rgba(255,80,100,0.32);
      transition: box-shadow 0s, background 0s, border-color 0s, transform 0.05s;
    }
    .btn.clear:active::after { opacity: 1; }

    /* ── Util (+/-, %): TEAL glow ── */
    .btn.util {
      background: rgba(4,14,12,0.76);
      border-color: rgba(0,190,140,0.12);
      border-top-color: rgba(0,210,160,0.18);
      color: rgba(80,195,155,0.82); font-size: 1rem;
    }
    .btn.util:hover {
      background: rgba(6,20,16,0.80);
      border-top-color: rgba(0,210,160,0.28);
    }
    .btn.util:active {
      background: rgba(0,190,140,0.24);
      border-color: rgba(0,190,140,0.50);
      border-top-color: rgba(0,220,170,0.70);
      box-shadow:
        0 0 20px rgba(0,190,140,0.65),
        0 0 46px rgba(0,190,140,0.22),
        inset 0 0 12px rgba(0,190,140,0.18),
        inset 0 1px 0 rgba(0,220,170,0.28);
      transition: box-shadow 0s, background 0s, border-color 0s, transform 0.05s;
    }
    .btn.util:active::after { opacity: 1; }

    .btn.zero { grid-column: span 2; justify-content: flex-start; padding-left: 28px; }

    /* ── AUDIO VISUALIZATION ── */
    #audio-viz-wrapper {
      position: relative; z-index: 1;
      height: 50px;
      background: rgba(0,0,0,0.60);
      border-top: 1px solid rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      overflow: hidden;
    }
    #audio-viz {
      width: 100%; height: 100%;
      display: block;
    }

    /* ══════════════════════════════════════════════
       EQUATION INTRO LAYER
    ══════════════════════════════════════════════ */
    #equation-layer {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      background: rgba(0,0,0,0.97);
      flex-wrap: wrap; gap: 0.3em;
      padding: 40px;
    }
    #equation-layer.active { opacity: 1; pointer-events: all; }
    #equation-layer.fading { opacity: 0; transition: opacity 0.5s ease; }


    .eq-char {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 9vw, 8rem);
      color: #fff;
      display: inline-block;
      opacity: 0;
      will-change: transform, opacity;
    }
    .eq-char.op-char {
      color: var(--glow-orange);
      text-shadow: 0 0 20px rgba(255,107,0,0.8), 0 0 60px rgba(255,107,0,0.3);
    }
    .eq-char.eq-sign {
      color: var(--glow-purple);
      text-shadow: 0 0 20px rgba(168,85,247,0.9), 0 0 60px rgba(168,85,247,0.4);
    }
    .eq-char.num-char {
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
    .eq-char.q-mark-char {
      color: #fff;
      text-shadow: 0 0 25px rgba(255,255,255,0.7), 0 0 60px rgba(168,85,247,0.4);
    }

    @keyframes char-arrive {
      0%   { opacity: 0; transform: translateY(-180px) rotate(-14deg) scale(1.7); filter: blur(12px); }
      50%  { opacity: 1; transform: translateY(10px) rotate(2deg) scale(0.93); filter: blur(0); }
      72%  { transform: translateY(-5px) rotate(-1deg) scale(1.04); }
      88%  { transform: translateY(2px) rotate(0.4deg) scale(0.99); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); filter: blur(0); }
    }
    @keyframes char-arrive-below {
      0%   { opacity: 0; transform: translateY(180px) rotate(14deg) scale(1.7); filter: blur(12px); }
      50%  { opacity: 1; transform: translateY(-10px) rotate(-2deg) scale(0.93); filter: blur(0); }
      72%  { transform: translateY(5px) rotate(1deg) scale(1.04); }
      88%  { transform: translateY(-2px) rotate(-0.4deg) scale(0.99); }
      100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); filter: blur(0); }
    }
    @keyframes char-arrive-left {
      0%   { opacity: 0; transform: translateX(-220px) rotate(-12deg) scale(1.6); filter: blur(12px); }
      52%  { opacity: 1; transform: translateX(10px) rotate(1.5deg) scale(0.94); filter: blur(0); }
      74%  { transform: translateX(-5px) rotate(-0.7deg) scale(1.03); }
      100% { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); filter: blur(0); }
    }
    @keyframes char-arrive-right {
      0%   { opacity: 0; transform: translateX(220px) rotate(12deg) scale(1.6); filter: blur(12px); }
      52%  { opacity: 1; transform: translateX(-10px) rotate(-1.5deg) scale(0.94); filter: blur(0); }
      74%  { transform: translateX(5px) rotate(0.7deg) scale(1.03); }
      100% { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); filter: blur(0); }
    }
    /* Diagonal arrivals for variety */
    @keyframes char-arrive-topleft {
      0%   { opacity: 0; transform: translate(-160px,-120px) rotate(-18deg) scale(1.6); filter: blur(12px); }
      55%  { opacity: 1; transform: translate(8px,6px) rotate(2deg) scale(0.93); filter: blur(0); }
      78%  { transform: translate(-4px,-3px) rotate(-0.8deg) scale(1.04); }
      100% { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); filter: blur(0); }
    }
    @keyframes char-arrive-topright {
      0%   { opacity: 0; transform: translate(160px,-120px) rotate(18deg) scale(1.6); filter: blur(12px); }
      55%  { opacity: 1; transform: translate(-8px,6px) rotate(-2deg) scale(0.93); filter: blur(0); }
      78%  { transform: translate(4px,-3px) rotate(0.8deg) scale(1.04); }
      100% { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); filter: blur(0); }
    }

    /* Glitch idle — positional */
    @keyframes char-glitch {
      0%,82%,100% { transform: translate(0,0) skewX(0deg); opacity:1; filter:none; }
      83%  { transform: translate(-6px,0) skewX(-8deg); opacity:0.7; filter:blur(1.5px); }
      85%  { transform: translate(8px,2px) skewX(6deg); opacity:0.85; }
      87%  { transform: translate(-4px,-2px) skewX(-3deg); opacity:0.95; filter:blur(0); }
      89%  { transform: translate(3px,0) skewX(1.5deg); opacity:1; }
    }
    /* Glitch color — hue spin */
    @keyframes char-glitch-color {
      0%,78%,100% { filter:none; opacity:1; }
      79%  { filter: hue-rotate(120deg) saturate(4) brightness(1.4); opacity:0.8; }
      82%  { filter: hue-rotate(-80deg) saturate(3); opacity:0.9; }
      85%  { filter: hue-rotate(200deg) saturate(5) brightness(1.8); opacity:0.85; }
      88%  { filter: none; opacity:1; }
    }
    /* Scale bounce — inflates violently */
    @keyframes char-scale-bounce {
      0%,75%,100% { transform: scale(1) rotate(0deg); filter:none; }
      77%  { transform: scale(1.6) rotate(3deg); filter:blur(2px) brightness(1.5); }
      81%  { transform: scale(0.75) rotate(-2deg); filter:blur(0); }
      85%  { transform: scale(1.2) rotate(1deg); }
      90%  { transform: scale(0.95); }
    }
    /* Color strobe — rapid flash */
    @keyframes char-strobe {
      0%,72%,100% { filter:none; opacity:1; }
      73%  { filter: brightness(8) saturate(0); opacity:1; }
      75%  { filter: none; opacity:0.4; }
      77%  { filter: brightness(6) saturate(0) hue-rotate(90deg); opacity:1; }
      80%  { filter: brightness(4); opacity:0.7; }
      83%  { filter: none; opacity:1; }
    }
    /* Skew snap — violent horizontal skew */
    @keyframes char-skew-snap {
      0%,76%,100% { transform: skewX(0deg) scaleX(1); opacity:1; filter:none; }
      77%  { transform: skewX(-28deg) scaleX(1.3); opacity:0.6; filter:blur(1px); }
      81%  { transform: skewX(18deg) scaleX(0.75); opacity:0.85; filter:none; }
      85%  { transform: skewX(-8deg) scaleX(1.08); }
      89%  { transform: skewX(2deg) scaleX(0.98); }
    }
    /* Chromatic split — RGB offset */
    @keyframes char-chroma {
      0%,74%,100% { text-shadow:inherit; filter:none; }
      75%  { text-shadow: -6px 0 2px #f00, 6px 0 2px #0ff; filter:blur(0.5px); }
      78%  { text-shadow: 8px 0 3px #f0f, -8px 0 3px #0f0; }
      81%  { text-shadow: -5px 2px 2px #00f, 5px -2px 2px #ff0; filter:none; }
      85%  { text-shadow: 3px 0 1px #f00, -3px 0 1px #0ff; }
      88%  { text-shadow: inherit; filter:none; }
    }
    /* Flip — X-axis mirror snap */
    @keyframes char-flip {
      0%,78%,100% { transform: scaleX(1) skewY(0deg); opacity:1; filter:none; }
      79%  { transform: scaleX(0.05) skewY(5deg); opacity:0.4; filter:blur(2px); }
      81%  { transform: scaleX(-1.15); opacity:0.75; filter:none; }
      84%  { transform: scaleX(1.08); opacity:1; }
      88%  { transform: scaleX(0.97); }
    }
    /* Teleport — disappears and reappears offset */
    @keyframes char-teleport {
      0%,70%,100% { opacity:1; transform:translate(0,0) scale(1); filter:none; }
      71%  { opacity:0; transform:translate(30px,-20px) scale(1.3); filter:blur(8px); }
      74%  { opacity:0; transform:translate(-40px,15px) scale(0.7); }
      77%  { opacity:1; transform:translate(5px,-3px) scale(1.1); filter:blur(1px); }
      80%  { transform:translate(0,0) scale(1); filter:none; }
    }
    /* Shake burst — rapid micro-vibration */
    @keyframes char-shake-burst {
      0%,72%,100% { transform: translate(0,0) rotate(0deg); }
      73%  { transform: translate(-8px,4px) rotate(-3deg); }
      75%  { transform: translate(9px,-5px) rotate(2.5deg); }
      77%  { transform: translate(-6px,6px) rotate(-2deg); }
      79%  { transform: translate(7px,-4px) rotate(1.5deg); }
      81%  { transform: translate(-4px,3px) rotate(-1deg); }
      83%  { transform: translate(3px,-2px) rotate(0.5deg); }
      85%  { transform: translate(-1px,1px); }
    }
    /* Color pulse — slow rainbow breathe */
    @keyframes char-rainbow {
      0%   { filter: hue-rotate(0deg) saturate(2); }
      25%  { filter: hue-rotate(90deg) saturate(3) brightness(1.3); }
      50%  { filter: hue-rotate(180deg) saturate(2.5); }
      75%  { filter: hue-rotate(270deg) saturate(3) brightness(1.2); }
      100% { filter: hue-rotate(360deg) saturate(2); }
    }

    /* ── DIGIT IDLE ANIMATIONS (no music connection) ── */
    @keyframes digit-float {
      0%,100% { transform: translateY(0) scale(1); }
      50%     { transform: translateY(-12px) scale(1.03); }
    }
    @keyframes digit-rock {
      0%,100% { transform: rotate(0deg) scale(1); }
      25%     { transform: rotate(-3deg) scale(1.04); }
      75%     { transform: rotate(3deg) scale(1.04); }
    }
    @keyframes digit-breathe {
      0%,100% { transform: scale(1); opacity: 1; }
      50%     { transform: scale(1.08); opacity: 0.85; }
    }
    @keyframes digit-jitter {
      0%,90%,100% { transform: translate(0,0) rotate(0deg); }
      92%  { transform: translate(-3px,2px) rotate(-1deg); }
      94%  { transform: translate(4px,-2px) rotate(1deg); }
      96%  { transform: translate(-2px,3px); }
      98%  { transform: translate(2px,-1px); }
    }
    @keyframes digit-glitch-idle {
      0%,80%,100% { transform: translate(0,0) skewX(0deg); filter:none; opacity:1; }
      82%  { transform: translate(-5px,0) skewX(-6deg); filter:blur(1px); opacity:0.7; }
      85%  { transform: translate(6px,1px) skewX(4deg); filter:none; opacity:0.9; }
      88%  { transform: translate(-2px,-1px); opacity:1; }
    }

    /* ══════════════════════════════════════════════
       REVEAL LAYER
    ══════════════════════════════════════════════ */
    #reveal-layer {
      position: fixed; inset: 0; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      flex-direction: column;
    }
    #reveal-layer.active  { pointer-events: all; opacity: 1; }
    #reveal-layer.fading  { opacity: 0; transition: opacity 0.9s ease; }

    /* ── IMAGE: fixed size, centered, not full-screen ── */
    /* GIFs are fully supported — they animate automatically as background-image. */
    #reveal-image {
      position: absolute;
      width: min(520px, 72vw);
      height: min(520px, 72vw);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.4) rotate(-8deg);
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 1;
      will-change: transform, filter;
      filter: blur(20px) brightness(3);
    }
    #reveal-image.visible {
      opacity: 1;
    }
    #reveal-image.fading-out { opacity: 0 !important; transition: opacity 1.2s ease !important; }
    /* Special 67 GIF — stretches to fill the entire screen */
    #reveal-image.fullscreen {
      width: 100vw !important;
      height: 100vh !important;
      background-size: cover !important;
      background-repeat: no-repeat !important;
    }

    #grey-overlay {
      position: absolute; inset: 0; z-index: 0;
      background: rgba(5, 5, 15, 0.55);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    #grey-overlay.visible { opacity: 1; }
    #grey-overlay.fading-out { opacity: 0 !important; transition: opacity 1.2s ease !important; }


    /* ── ANSWER DISPLAY ── */
    #answer-display {
      position: relative; z-index: 4;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 22vw, 16rem);
      color: #fff;
      text-align: center; line-height: 0.85; letter-spacing: 6px;
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center;
      padding: 0 20px;
      gap: 0.02em;
      pointer-events: none;
    }

    .digit-group {
      display: inline-block;
      opacity: 0;
      will-change: transform, opacity, filter;
      text-shadow:
        0 0 30px rgba(0,0,0,0.9),
        0 0 60px rgba(0,0,0,0.8),
        0 0 90px rgba(0,0,0,0.7);
    }


    /* ── EXIT X BUTTON ── */
    #exit-btn {
      position: fixed;
      top: 24px; right: 28px;
      z-index: 600;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      color: rgba(255,255,255,0.35);
      font-size: 1.6rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      text-shadow: 0 0 8px rgba(255,255,255,0.2);
      transition: opacity 0.8s ease, color 0.2s, border-color 0.2s, background 0.2s;
    }
    #exit-btn.visible { opacity: 1; pointer-events: all; }
    #exit-btn:hover {
      color: rgba(255,80,80,0.9);
      border-color: transparent;
      background: transparent;
    }

    /* ── KEYFRAMES (misc) ── */
    @keyframes drop-flash   { 0% { opacity: 0.98; } 100% { opacity: 0; } }
    @keyframes value-pulse  { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; color: #666; } }
    @keyframes blink        { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }

    @keyframes tension-grow {
      0%   { width: 0%;   background: var(--glow-purple); }
      60%  { width: 75%;  background: var(--glow-orange); }
      90%  { width: 95%;  background: var(--glow-red); }
      100% { width: 100%; background: var(--glow-red); }
    }

    @keyframes mega-shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      7%   { transform: translate(-14px,-8px) rotate(-1deg); }
      14%  { transform: translate(14px,8px) rotate(1deg); }
      21%  { transform: translate(-10px,5px) rotate(-0.6deg); }
      28%  { transform: translate(10px,-5px) rotate(0.6deg); }
      36%  { transform: translate(-7px,8px) rotate(-0.4deg); }
      44%  { transform: translate(7px,-8px) rotate(0.4deg); }
      52%  { transform: translate(-5px,5px) rotate(-0.22deg); }
      60%  { transform: translate(5px,-5px) rotate(0.22deg); }
      70%  { transform: translate(-3px,3px); }
      80%  { transform: translate(3px,-3px); }
      90%  { transform: translate(-1px,1px); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes pre-shake {
      0%,100% { transform: translate(0,0); }
      25%  { transform: translate(-1px,1px); }
      75%  { transform: translate(1px,-1px); }
    }
    @keyframes pre-intense {
      0%,100% { transform: translate(0,0); }
      20%  { transform: translate(-3px,2px) rotate(-0.25deg); }
      40%  { transform: translate(3px,-2px) rotate(0.25deg); }
      60%  { transform: translate(-2px,3px); }
      80%  { transform: translate(2px,-3px); }
    }

    body.pre-shake   { animation: pre-shake 0.3s ease-in-out infinite; }
    body.pre-intense { animation: pre-intense 0.15s ease-in-out infinite; }
    body.mega-shaking { animation: mega-shake 0.65s ease-out forwards; }

    /* ── DIGIT FLIGHT ANIMATIONS ── */
    /* Ease-in easing on the animation keeps motion through the full duration,
       so digits are still flying hard when they snap to 100% at beat drop */
    @keyframes fly-from-top {
      0%   { opacity: 0; transform: translateY(-140vh) scaleY(1.5) rotate(-6deg); filter: blur(18px); }
      15%  { opacity: 0.7; }
      100% { opacity: 1; transform: translateY(0) scaleY(1) rotate(0deg); filter: blur(0); }
    }
    @keyframes fly-from-bottom {
      0%   { opacity: 0; transform: translateY(140vh) scaleY(1.5) rotate(6deg); filter: blur(18px); }
      15%  { opacity: 0.7; }
      100% { opacity: 1; transform: translateY(0) scaleY(1) rotate(0deg); filter: blur(0); }
    }
    @keyframes fly-from-left {
      0%   { opacity: 0; transform: translateX(-140vw) scaleX(1.5) rotate(-6deg); filter: blur(18px); }
      15%  { opacity: 0.7; }
      100% { opacity: 1; transform: translateX(0) scaleX(1) rotate(0deg); filter: blur(0); }
    }
    @keyframes fly-from-right {
      0%   { opacity: 0; transform: translateX(140vw) scaleX(1.5) rotate(6deg); filter: blur(18px); }
      15%  { opacity: 0.7; }
      100% { opacity: 1; transform: translateX(0) scaleX(1) rotate(0deg); filter: blur(0); }
    }
    /* Diagonal digit flight for variation */
    @keyframes fly-from-topleft {
      0%   { opacity: 0; transform: translate(-120vw,-110vh) scale(1.6) rotate(-15deg); filter: blur(18px); }
      15%  { opacity: 0.7; }
      100% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); filter: blur(0); }
    }
    @keyframes fly-from-topright {
      0%   { opacity: 0; transform: translate(120vw,-110vh) scale(1.6) rotate(15deg); filter: blur(18px); }
      15%  { opacity: 0.7; }
      100% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); filter: blur(0); }
    }

    /* Glow pulse — soft dark blur behind text + subtle white glow */
    @keyframes glow-pulse {
      0%,100% {
        text-shadow:
          0 0 30px rgba(0,0,0,0.9),
          0 0 60px rgba(0,0,0,0.8),
          0 0 90px rgba(0,0,0,0.7),
          0 0 20px rgba(255,255,255,0.15);
      }
      50% {
        text-shadow:
          0 0 30px rgba(0,0,0,0.9),
          0 0 60px rgba(0,0,0,0.8),
          0 0 90px rgba(0,0,0,0.7),
          0 0 35px rgba(255,255,255,0.28),
          0 0 70px rgba(255,255,255,0.1);
      }
    }

    /* Answer display fade-out after song ends */
    #answer-display.fading-out .digit-group {
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease !important;
      opacity: 0 !important;
      filter: blur(14px) !important;
      transform: scale(1.18) !important;
    }

    /* ── ACHIEVEMENT BUTTON ── */
    #achievement-btn {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 50;
      padding: 7px 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-family: 'Black Ops One', sans-serif;
      font-size: 0.72rem; letter-spacing: 3px;
      border: 1px solid rgba(255,200,0,0.28);
      border-radius: 5px;
      background: rgba(10,7,0,0.60);
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s, color 0.2s,
                  box-shadow 0.2s, opacity 0.9s ease;
      user-select: none;
      color: rgba(255,210,0,0.75);
      text-shadow: 0 0 10px rgba(255,180,0,0.30);
      box-shadow: 0 0 12px rgba(255,160,0,0.08), inset 0 1px 0 rgba(255,200,0,0.06);
    }
    #achievement-btn.anim-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #achievement-btn:hover {
      color: rgba(255,225,0,1);
      border-color: rgba(255,200,0,0.65);
      background: rgba(30,18,0,0.75);
      text-shadow: 0 0 12px rgba(255,190,0,0.55);
      box-shadow: 0 0 20px rgba(255,160,0,0.20), inset 0 1px 0 rgba(255,200,0,0.10);
    }
    #achievement-badge {
      position: absolute;
      top: -5px; right: -5px;
      background: #ff2244;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      font-weight: bold;
      min-width: 17px; height: 17px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 3px;
      pointer-events: none;
      line-height: 1;
    }
    #achievement-badge.hidden { display: none; }

    /* ── ACHIEVEMENT TOAST ── */
    #achievement-toast {
      position: fixed;
      top: 70px; right: 20px;
      z-index: 750;
      width: 230px;
      background: rgba(8,6,18,0.96);
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 24px rgba(255,180,0,0.18), 0 6px 24px rgba(0,0,0,0.85);
      transform: translateX(270px);
      transition: transform 0.45s cubic-bezier(0.175,0.885,0.32,1.1);
      pointer-events: none;
    }
    #achievement-toast.visible { transform: translateX(0); }
    #toast-header {
      font-family: 'Black Ops One', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 2px;
      color: rgba(255,200,0,0.9);
      text-shadow: 0 0 8px rgba(255,200,0,0.5);
      margin-bottom: 7px;
    }
    #toast-body { display: flex; align-items: center; gap: 10px; }
    #toast-img {
      width: 46px; height: 46px;
      background-size: contain; background-position: center; background-repeat: no-repeat;
      border-radius: 5px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #toast-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem; color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
    }

    /* ── ACHIEVEMENT PANEL ── */
    #achievement-panel {
      position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(18px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #achievement-panel.open { opacity: 1; pointer-events: all; }
    #achievement-panel-inner {
      width: min(480px, 92vw);
      max-height: 82vh;
      background: rgba(8,6,18,0.97);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-color: rgba(255,255,255,0.14);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(168,85,247,0.2), 0 20px 60px rgba(0,0,0,0.9);
      display: flex; flex-direction: column;
    }
    #achievement-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    #achievement-panel-title {
      font-family: 'Black Ops One', sans-serif;
      font-size: 0.72rem; letter-spacing: 4px;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 0 10px rgba(168,85,247,0.6);
    }
    #achievement-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: rgba(168,85,247,0.7);
      margin-left: 10px;
    }
    #achievement-close {
      background: none; border: none;
      color: rgba(255,255,255,0.35);
      font-size: 1rem; cursor: pointer;
      padding: 3px 7px; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    #achievement-close:hover {
      color: rgba(255,80,80,0.9);
      background: rgba(80,0,0,0.4);
    }
    #achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px; padding: 14px;
      overflow-y: auto;
    }
    .ach-card {
      background: rgba(18,14,30,0.85);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      padding: 10px 6px 8px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      position: relative;
    }
    .ach-card.unlocked {
      border-color: rgba(168,85,247,0.28);
      box-shadow: 0 0 10px rgba(168,85,247,0.08);
    }
    .ach-card.is-new {
      border-color: rgba(255,200,0,0.55);
      box-shadow: 0 0 14px rgba(255,200,0,0.18);
    }
    .ach-card-img {
      width: 80px; height: 80px;
      background-size: contain; background-position: center; background-repeat: no-repeat;
    }
    .ach-card-locked {
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; opacity: 0.22;
    }
    .ach-card-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem; color: rgba(255,255,255,0.35);
      text-align: center; letter-spacing: 0.3px;
      word-break: break-word; line-height: 1.3;
    }
    .ach-card.unlocked .ach-card-name { color: rgba(255,255,255,0.72); }
    .ach-new-badge {
      position: absolute; top: -5px; right: -5px;
      background: #ff2244; color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.48rem; font-weight: bold;
      padding: 2px 4px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── RARITY LABELS ── */
    .ach-rarity {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem; letter-spacing: 0.6px;
      text-align: center; line-height: 1.3;
    }
    .ach-rarity.rarity-common    { color: rgba(170,170,185,0.65); }
    .ach-rarity.rarity-rare      { color: rgba(60,150,255,0.90);  }
    .ach-rarity.rarity-epic      { color: rgba(178,105,247,0.92); }
    .ach-rarity.rarity-legendary { color: rgba(255,178,0,0.96); text-shadow: 0 0 8px rgba(255,165,0,0.45); }
    .ach-rarity.rarity-special   { color: rgba(255,80,140,0.96); text-shadow: 0 0 8px rgba(255,50,100,0.45); }
    /* Rarity-tinted card borders (override generic unlocked style) */
    .ach-card.unlocked.rarity-common    { border-color: rgba(170,170,185,0.18); box-shadow: none; }
    .ach-card.unlocked.rarity-rare      { border-color: rgba(60,150,255,0.35);  box-shadow: 0 0 10px rgba(60,150,255,0.10);  }
    .ach-card.unlocked.rarity-epic      { border-color: rgba(178,105,247,0.42); box-shadow: 0 0 13px rgba(168,85,247,0.14); }
    .ach-card.unlocked.rarity-legendary { border-color: rgba(255,178,0,0.52);   box-shadow: 0 0 18px rgba(255,165,0,0.22);  }
    .ach-card.unlocked.rarity-special   { border-color: rgba(255,80,140,0.58);  box-shadow: 0 0 20px rgba(255,50,100,0.24); }
    /* Locked cards get a faint rarity hint for Legendary/Special */
    .ach-card.rarity-legendary { border-color: rgba(255,178,0,0.18); }
    .ach-card.rarity-special   { border-color: rgba(255,80,140,0.20); }
    /* ── CATEGORY HEADERS ── */
    .ach-category-header {
      grid-column: 1 / -1;
      font-family: 'Black Ops One', sans-serif;
      font-size: 0.6rem; letter-spacing: 3px;
      color: rgba(255,255,255,0.30);
      padding: 14px 2px 5px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      text-transform: uppercase;
    }
    .ach-category-header:first-child { padding-top: 2px; }

    /* Toast rarity line */
    #toast-rarity {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; letter-spacing: 1px;
      margin-top: 2px;
    }
    #toast-rarity.rarity-common    { color: rgba(170,170,185,0.75); }
    #toast-rarity.rarity-rare      { color: rgba(60,150,255,0.9);   }
    #toast-rarity.rarity-epic      { color: rgba(178,105,247,0.9);  }
    #toast-rarity.rarity-legendary { color: rgba(255,178,0,0.96); text-shadow: 0 0 6px rgba(255,165,0,0.4); }
    #toast-rarity.rarity-special   { color: rgba(255,80,140,0.96); text-shadow: 0 0 6px rgba(255,50,100,0.4); }
  </style>
</head>
<body>

  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="flash-overlay"></div>

  <!-- Phase 1: Equation intro -->
  <div id="equation-layer"></div>

  <!-- Phase 2: Answer reveal + image -->
  <div id="reveal-layer">
    <div id="reveal-image"></div>
    <div id="grey-overlay"></div>
    <div id="answer-display"></div>
  </div>

  <!-- Exit X button -->
  <div id="exit-btn" title="Skip">✕</div>

  <!-- Achievement button -->
  <div id="achievement-btn">
    ACHIEVEMENTS
    <span id="achievement-badge" class="hidden">0</span>
  </div>

  <!-- Achievement unlock toast -->
  <div id="achievement-toast">
    <div id="toast-header">🏆 ACHIEVEMENT UNLOCKED</div>
    <div id="toast-body">
      <div id="toast-img"></div>
      <div>
        <div id="toast-name"></div>
        <div id="toast-rarity"></div>
      </div>
    </div>
  </div>

  <!-- Achievement panel -->
  <div id="achievement-panel">
    <div id="achievement-panel-inner">
      <div id="achievement-panel-header">
        <div>
          <span id="achievement-panel-title">ACHIEVEMENTS</span>
          <span id="achievement-count"></span>
        </div>
        <button id="achievement-close">✕</button>
      </div>
      <div id="achievement-grid"></div>
    </div>
  </div>

  <!-- Calculator -->
  <div id="calculator">
    <div id="calc-header">PHONKY CALCULATOR</div>
    <div id="display">
      <div id="expression"></div>
      <div id="current-value">0</div>
      <div id="tension-bar"><div id="tension-fill"></div></div>
    </div>
    <div id="audio-viz-wrapper">
      <canvas id="audio-viz"></canvas>
    </div>
    <div id="buttons">
      <button class="btn clear"    data-action="clear"                    data-pitch="1.8">AC</button>
      <button class="btn util"     data-action="sign"                     data-pitch="1.5">+/-</button>
      <button class="btn util"     data-action="percent"                  data-pitch="1.65">%</button>
      <button class="btn operator" data-action="operator" data-value="/"  data-pitch="2.0">÷</button>
      <button class="btn"          data-action="digit"    data-value="7"  data-pitch="1.4">7</button>
      <button class="btn"          data-action="digit"    data-value="8"  data-pitch="1.5">8</button>
      <button class="btn"          data-action="digit"    data-value="9"  data-pitch="1.6">9</button>
      <button class="btn operator" data-action="operator" data-value="*"  data-pitch="1.85">×</button>
      <button class="btn"          data-action="digit"    data-value="4"  data-pitch="1.1">4</button>
      <button class="btn"          data-action="digit"    data-value="5"  data-pitch="1.2">5</button>
      <button class="btn"          data-action="digit"    data-value="6"  data-pitch="1.3">6</button>
      <button class="btn operator" data-action="operator" data-value="-"  data-pitch="1.7">−</button>
      <button class="btn"          data-action="digit"    data-value="1"  data-pitch="0.8">1</button>
      <button class="btn"          data-action="digit"    data-value="2"  data-pitch="0.9">2</button>
      <button class="btn"          data-action="digit"    data-value="3"  data-pitch="1.0">3</button>
      <button class="btn operator" data-action="operator" data-value="+"  data-pitch="1.55">+</button>
      <button class="btn zero"     data-action="digit"    data-value="0"  data-pitch="0.65">0</button>
      <button class="btn"          data-action="dot"                       data-pitch="0.75">.</button>
      <button class="btn equals"   data-action="equals"                   data-pitch="2.2">=</button>
    </div>
  </div>

  <audio id="phonk-audio" preload="auto"></audio>

  <script>
  'use strict';

  // ══════════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════════
  const State = {
    mode: 'IDLE',   // 'IDLE' | 'QUESTION' | 'EQUATION' | 'REVEALING' | 'ENDING'
    current: '0',
    previous: '',
    operator: null,
    justEvaled: false,
    pendingAnswer: null,
    waitingForOperand: false,
  };

  // ══════════════════════════════════════════════════
  //  ENGINE
  // ══════════════════════════════════════════════════
  const Engine = {
    compute(a, op, b) {
      const fa = parseFloat(a), fb = parseFloat(b);
      let r;
      switch (op) {
        case '+': r = fa + fb; break;
        case '-': r = fa - fb; break;
        case '*': r = fa * fb; break;
        case '/': if (fb === 0) return 'ERROR'; r = fa / fb; break;
        default: return b;
      }
      return parseFloat(r.toPrecision(12)).toString();
    },
    format(val) {
      if (val === 'ERROR') return 'ERROR';
      const n = parseFloat(val);
      if (isNaN(n)) return 'ERROR';
      return parseFloat(n.toPrecision(12)).toString();
    }
  };

  // ══════════════════════════════════════════════════
  //  DISPLAY
  // ══════════════════════════════════════════════════
  const Display = {
    valueEl: null, exprEl: null, tensionBar: null, tensionFill: null,
    init() {
      this.valueEl     = document.getElementById('current-value');
      this.exprEl      = document.getElementById('expression');
      this.tensionBar  = document.getElementById('tension-bar');
      this.tensionFill = document.getElementById('tension-fill');
    },
    update(value, expr) {
      // Never render a bare trailing dot — "5." shows as "5." while typing,
      // but strip it from the expression line to avoid "5. +" looking odd.
      this.valueEl.textContent = value;
      this.exprEl.textContent  = (expr || '').replace(/\.$/, '').replace(/\.(?=\s)/, '');
      const l = value.length;
      this.valueEl.style.fontSize = l > 14 ? '1.4rem' : l > 10 ? '2rem' : l > 7 ? '2.5rem' : '3rem';
    },
    blank() {
      this.valueEl.textContent = '';
      this.exprEl.textContent  = '';
      this.valueEl.classList.remove('pulsing');
      this.tensionBar.classList.remove('active');
    },
    showTension(durationSec) {
      this.valueEl.classList.add('pulsing');
      this.valueEl.textContent = '...';
      this.tensionBar.style.setProperty('--tension-duration', durationSec + 's');
      this.tensionFill.style.animation = 'none';
      this.tensionFill.offsetHeight;
      this.tensionBar.classList.add('active');
    },
    showResult(answer) {
      this.valueEl.classList.remove('pulsing');
      this.tensionBar.classList.remove('active');
      this.tensionFill.style.animation = '';
      this.update(answer, '');
    }
  };

  // ══════════════════════════════════════════════════
  //  INLINE MANIFEST  (works with file:// — no server needed)
  //  Add songs/images here AND run add_song.py / add_image.py
  //  to keep this in sync automatically.
  // ══════════════════════════════════════════════════
  window.PHONK_MANIFEST = {
    "songs": [
        {
            "file": "songs/la vida/la-vida-es-un-carrusel.mp3",
            "beatdrop": 5.0
        },
        {
            "file": "songs/song10/toma-toma-phonk.mp3",
            "beatdrop": 4.0
        },
        {
            "file": "songs/song11/brazil-phonk.mp3",
            "beatdrop": 7.2
        },
        {
            "file": "songs/song12/montagem-espaco-renicht-super-slowed-dj-veta3.mp3",
            "beatdrop": 5.1
        },
        {
            "file": "songs/song13/ilyhiryu-smezir-2-mega-slowed.mp3",
            "beatdrop": 14.1
        },
        {
            "file": "songs/song14/grok-released.mp3",
            "beatdrop": 7.0
        },
        {
            "file": "songs/song15/phonk-phonk-ppppppppppp.mp3",
            "beatdrop": 6.5
        },
        {
            "file": "songs/song16/vem-vem-phonk-phonk.mp3",
            "beatdrop": 5.73
        },
        {

        },
        {

        },
        {

            "beatdrop": 4.1
        },
        {
            "file": "songs/song6/67-kid-phonk.mp3",
            "beatdrop": 5.0
        },
        {
            "file": "songs/song7/lets-go-gambling-phonk.mp3",
            "beatdrop": 6.1
        },
        {
            "file": "songs/song8/phonk-brasilenho.mp3",
            "beatdrop": 4.3
        },
        {
            "file": "songs/song9/ai-edit.mp3",
            "beatdrop": 3.75
        }
    ],
    "images": [
        "images/sigma.png",
        "images/crashout skull.png",
        "images/freaky skull.png",
        "images/gigachad.png",
        "images/glitched trollface.png",
        "images/goofy-skull-skull-goofy-removebg-preview.png",
        "images/jockier.png",
        "images/sigma emoji 1.png",
        "images/skull emoji.png",
        "images/trolface red eyes.png",
        "images/trollface crashout.webp",
        "images/trollface god.png",
