        "images/tuff skull.png"
    ]
};

  const Manifest = {
    data: null,
    async load() {
      if (this.data) return;
      if (window.PHONK_MANIFEST) { this.data = window.PHONK_MANIFEST; return; }
      try {
        const r = await fetch('./manifest.json?v=' + Date.now());
        if (!r.ok) throw 0;
        this.data = await r.json();
      } catch {
        this.data = { songs: [], images: [] };
      }
    },
    pickRandom() {
      const songs  = this.data.songs  || [];
      const images = this.data.images || [];
      const song = songs.length  ? songs [Math.floor(Math.random() * songs.length)]  : null;
      const img  = images.length ? images[Math.floor(Math.random() * images.length)] : null;
      return { song, img };
    }
  };

  // ══════════════════════════════════════════════════
  //  BEAT ANALYSER — drives image + number size pulse
  //  Uses a single persistent AudioContext + source node
  //  (createMediaElementSource can only be called ONCE
  //   per HTMLMediaElement — calling it again throws.
  //   So we create it once and reuse it every play.)
  // ══════════════════════════════════════════════════
  const BeatAnalyser = {
    ctx: null, analyser: null, source: null, data: null,
    raf: null, active: false,
    lastBeat: 0, beatCooldown: 200,
    _connected: false,
    _ctxReady: false,   // true once AudioContext + analyser are alive

    // Create AudioContext + analyser on any user gesture (button click etc.)
    // Safe to call multiple times — only sets up once.
    setupCtx() {
      if (this._ctxReady) return true;
      try {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        if (!this.analyser) {
          this.analyser = this.ctx.createAnalyser();
          this.analyser.fftSize = 256;
          this.analyser.smoothingTimeConstant = 0.78;
          this.data = new Uint8Array(this.analyser.frequencyBinCount);
          // Compressor keeps button sounds and music at consistent loudness
          this._compressor = this.ctx.createDynamicsCompressor();
          this._compressor.threshold.value = -24;
          this._compressor.knee.value      = 8;
          this._compressor.ratio.value     = 4;
          this._compressor.attack.value    = 0.003;
          this._compressor.release.value   = 0.15;
          this.analyser.connect(this._compressor);
          this._compressor.connect(this.ctx.destination);
        }
        this._ctxReady = true;
        return true;
      } catch(e) {
        console.warn('[BeatAnalyser] setupCtx failed:', e);
        return false;
      }
    },

    // Wire up the phonk <audio> element (called once when = is pressed).
    setup(audioEl) {
      this.setupCtx();
      if (!this.ctx) return false;
      if (this.ctx.state === 'suspended') this.ctx.resume();
      if (!this._connected) {
        try {
          this.source = this.ctx.createMediaElementSource(audioEl);
          this.source.connect(this.analyser);
          this._connected = true;
        } catch(e) {
          console.warn('[BeatAnalyser] setup failed:', e);
          return false;
        }
      }
      return true;
    },

    start() {
      this.active = true;
      this._tick();
    },

    // Whether the image entrance animation is done and JS pulsing can take over
    _imgReady: false,

    stop() {
      this.active = false;
      cancelAnimationFrame(this.raf);
      this.raf = null;
      this._imgReady = false;
      // Reset image/digit transforms to neutral
      const imgEl = document.getElementById('reveal-image');
      if (imgEl) imgEl.style.transform = 'translate(-50%,-50%) scale(1)';
      document.querySelectorAll('.digit-group').forEach(el => {
        el.style.transform = '';
      });
    },

    // Called by _executeDrop after image becomes visible
    // Runs the entrance animation via JS, then enables pulsing
    animateImageEntrance() {
      this._imgReady = false;
      const imgEl = document.getElementById('reveal-image');
      if (!imgEl) return;
      // Start blurred/small, animate to normal over ~600ms
      imgEl.style.transition = 'none';
      imgEl.style.transform  = 'translate(-50%,-50%) scale(0.4) rotate(-8deg)';
      imgEl.style.filter     = 'blur(20px) brightness(3)';
      imgEl.offsetHeight; // force reflow
      // Step 1 — slam to slightly-over scale
      imgEl.style.transition = 'transform 360ms cubic-bezier(0.175,0.885,0.32,1.275), filter 360ms ease';
      imgEl.style.transform  = 'translate(-50%,-50%) scale(1.08) rotate(1.5deg)';
      imgEl.style.filter     = 'blur(2px) brightness(1.2)';
      setTimeout(() => {
        imgEl.style.transition = 'transform 160ms ease, filter 160ms ease';
        imgEl.style.transform  = 'translate(-50%,-50%) scale(0.97) rotate(-0.5deg)';
        imgEl.style.filter     = 'blur(0) brightness(1)';
        setTimeout(() => {
          imgEl.style.transition = 'transform 100ms ease';
          imgEl.style.transform  = 'translate(-50%,-50%) scale(1) rotate(0deg)';
          setTimeout(() => {
            // Clear transition so JS can override directly each frame
            imgEl.style.transition = 'none';
            this._imgReady = true;
          }, 110);
        }, 170);
      }, 370);
    },

    _tick() {
      if (!this.active || !this.analyser) return;
      this.analyser.getByteFrequencyData(this.data);

      // Bass = first ~10 bins
      let bass = 0;
      const bassEnd = Math.min(10, this.data.length);
      for (let i = 0; i < bassEnd; i++) bass += this.data[i];
      bass /= bassEnd;

      // Overall energy = all bins averaged
      let energy = 0;
      for (let i = 0; i < this.data.length; i++) energy += this.data[i];
      energy /= this.data.length;

      const now = performance.now();
      const isBeat = bass > 135 && (now - this.lastBeat) > this.beatCooldown;
      if (isBeat) {
        this.lastBeat = now;
        this._onBeat(bass);
      }

      // ── Continuous SIZE pulse driven by energy ──
      if (this._imgReady) {
        const imgScale = 1 + (energy / 255) * 0.28;
        const imgEl = document.getElementById('reveal-image');
        if (imgEl && imgEl.classList.contains('visible')) {
          imgEl.style.transform = `translate(-50%,-50%) scale(${imgScale})`;
        }
      }

      this.raf = requestAnimationFrame(() => this._tick());
    },

    _onBeat(bass) {
      // On a strong beat: snap image to a much bigger scale then energy tick brings it back
      if (this._imgReady) {
        const imgEl = document.getElementById('reveal-image');
        if (imgEl && imgEl.classList.contains('visible')) {
          const beatScale = 1 + (bass / 255) * 0.55;
          imgEl.style.transform = `translate(-50%,-50%) scale(${beatScale})`;
        }
      }
    }
  };

  // ══════════════════════════════════════════════════
  //  AUDIO PLAYER
  // ══════════════════════════════════════════════════
  const AudioPlayer = {
    fadeOut(audio, ms) {
      BeatAnalyser.stop();
      const t0 = performance.now(), v0 = audio.volume;
      const tick = now => {
        const p = Math.min((now - t0) / ms, 1);
        audio.volume = v0 * (1 - p);
        if (p < 1) requestAnimationFrame(tick);
        else { audio.pause(); audio.currentTime = 0; }
      };
      requestAnimationFrame(tick);
    }
  };


  // ══════════════════════════════════════════════════
  //  DIRECTION ASSIGNMENT
  // ══════════════════════════════════════════════════
  // Symmetric opposite pairs — each digit mirrors another across the center
  const OPPOSITE_PAIRS = [
    ['left',    'right'   ],
    ['top',     'bottom'  ],
    ['topleft', 'topright'],
  ];

  function assignDirections(n) {
    // Pick a random pair type for this reveal
    const pair = OPPOSITE_PAIRS[Math.floor(Math.random() * OPPOSITE_PAIRS.length)];
    // Alternate between the two sides: 0→left, 1→right, 2→left, 3→right …
    return Array.from({length: n}, (_, i) => pair[i % 2]);
  }

  // ══════════════════════════════════════════════════
  //  SPLIT ANSWER INTO GROUPS
  // ══════════════════════════════════════════════════
  function splitIntoGroups(answer) {
    if (answer === 'ERROR') return ['ERROR'];
    const chars = answer.split('');
    const n = chars.length;
    if (n <= 3) return chars.map(c => c);
    // 4+: pairs (treating full answer including decimal point as-is)
    const groups = [];
    let i = 0;
    while (i < n) {
      let chunk = chars[i++];
      if (i < n && chars[i] !== '-') chunk += chars[i++];
      groups.push(chunk);
    }
    return groups;
  }


  // ══════════════════════════════════════════════════
  //  EQUATION INTRO
  // ══════════════════════════════════════════════════
  const EquationIntro = {
    layer: null, charEls: [],

    show(equationStr, introDurationMs, onDone) {
      this.layer = document.getElementById('equation-layer');
      this.layer.innerHTML = '';
      this.charEls = [];
      this.layer.classList.remove('fading');
      this.layer.classList.add('active');

      // Split into clean tokens (numbers, operator, =, ?) — no stray spaces
      const display = equationStr.replace(/\*/g,'×').replace(/\//g,'÷');
      const tokens  = display.trim().split(/\s+/);

      const DROP_IN_BUDGET = introDurationMs * 0.60;
      const HOLD_BUDGET    = introDurationMs * 0.20;
      const TOKEN_INTERVAL = Math.min(180, DROP_IN_BUDGET / Math.max(tokens.length, 1));

      const arriveAnims = [
        'char-arrive','char-arrive-below','char-arrive-left','char-arrive-right',
        'char-arrive-topleft','char-arrive-topright'
      ];
      const glitchAnims = [
        'char-glitch', 'char-glitch-color', 'char-scale-bounce',
        'char-strobe', 'char-skew-snap', 'char-chroma',
        'char-flip', 'char-teleport', 'char-shake-burst',
        'char-rainbow', 'char-glitch', 'char-glitch-color'
      ];

      tokens.forEach((tok, i) => {
        const span = document.createElement('span');
        span.className = 'eq-char';
        if ('×÷+−-'.includes(tok))  span.classList.add('op-char');
        else if (tok === '=')        span.classList.add('eq-sign');
        else if (tok === '?')        span.classList.add('q-mark-char');
        else if (/^-?\d/.test(tok)) span.classList.add('num-char');
        span.textContent = tok;
        this.layer.appendChild(span);
        this.charEls.push(span);

        const anim = arriveAnims[Math.floor(Math.random() * arriveAnims.length)];
        const dur  = 380 + Math.random() * 100;
        const arriveAt = i * TOKEN_INTERVAL;
        setTimeout(() => {
          span.style.animation = `${anim} ${dur}ms cubic-bezier(0.12,0.9,0.28,1.18) forwards`;
          setTimeout(() => {
            const gAnim = glitchAnims[Math.floor(Math.random() * glitchAnims.length)];
            const gDur  = 1.4 + Math.random() * 2.2;
            span.style.animation = `${gAnim} ${gDur.toFixed(2)}s ease-in-out infinite`;
            span.style.opacity = '1';
          }, dur + 40);
        }, arriveAt);

        // Flash on every token landing
        const flash = document.getElementById('flash-overlay');
        setTimeout(() => {
          flash.classList.remove('firing'); flash.offsetHeight; flash.classList.add('firing');
        }, arriveAt + dur * 0.5);
      });

      // Hold phase: rapid strobe burst — 4 flashes
      const flash = document.getElementById('flash-overlay');
      const holdStart = DROP_IN_BUDGET;
      [0, 180, 380, 600].forEach(offset => {
        setTimeout(() => {
          flash.classList.remove('firing'); flash.offsetHeight; flash.classList.add('firing');
        }, holdStart + offset);
      });

      setTimeout(() => {
        this._explode(onDone, introDurationMs - DROP_IN_BUDGET - HOLD_BUDGET);
      }, DROP_IN_BUDGET + HOLD_BUDGET);
    },

    _explode(onDone, timeLeft) {
      const W = window.innerWidth, H = window.innerHeight;
      this.charEls.forEach(el => {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        const dx = cx - W/2, dy = cy - H/2;
        const dist = Math.sqrt(dx*dx+dy*dy) || 1;
        const power = 800 + Math.random() * 1000;
        const tx = (dx/dist)*power + (Math.random()-0.5)*600;
        const ty = (dy/dist)*power + (Math.random()-0.5)*600 + 200;
        const rot = (Math.random()-0.5)*1080;
        const scl = 0.05 + Math.random()*0.25;

        const kf = 'ex_' + (Math.random()*1e9|0);
        const s = document.createElement('style');
        s.textContent = `@keyframes ${kf} {
          0%   { opacity:1; transform:translate(0,0) rotate(0deg) scale(1) skewX(0deg); filter:blur(0); }
          10%  { opacity:1; filter:blur(3px); transform:translate(${tx*0.05}px,${ty*0.05}px) scale(1.15); }
          100% { opacity:0; transform:translate(${tx}px,${ty}px) rotate(${rot}deg) scale(${scl}) skewX(${(Math.random()-0.5)*35}deg); filter:blur(10px); }
        }`;
        document.head.appendChild(s);
        const eDur = Math.min(timeLeft * 0.85, 750);
        el.style.animation = `${kf} ${eDur}ms cubic-bezier(0.5,0,1,0.5) forwards`;
      });

      const fadeDur = Math.max(timeLeft * 0.38, 250);
      setTimeout(() => {
        this.layer.classList.add('fading');
        setTimeout(() => {
          this.layer.classList.remove('active','fading');
          this.layer.innerHTML = '';
          if (onDone) onDone();
        }, fadeDur);
      }, Math.max(timeLeft * 0.52, 180));
    }
  };

  // ══════════════════════════════════════════════════
  //  ANSWER REVEAL
  // ══════════════════════════════════════════════════
  const AnswerReveal = {
    buildGroups(groups, directions) {
      const container = document.getElementById('answer-display');
      container.innerHTML = '';
      container.classList.remove('fading-out');
      const els = [];
      groups.forEach((g, i) => {
        const span = document.createElement('span');
        span.className = 'digit-group';
        span.textContent = g;
        span.dataset.dir = directions[i];
        container.appendChild(span);
        els.push(span);
      });
      return els;
    },

    launch(groupEls, flyDur) {
      // Digits fly for full duration — easing stays in motion until the end
      // so they slam into position right at beat drop, not before
      groupEls.forEach(el => {
        const dir = el.dataset.dir;
        const animName = `fly-from-${dir}`;
        // ease-in: slow start, fast finish — still moving hard at the last frame
        el.style.animation = `${animName} ${flyDur}ms cubic-bezier(0.4,0,1,1) forwards`;
      });
    },

    activateGlow(groupEls) {
      groupEls.forEach((el, i) => {
        setTimeout(() => {
          el.style.animation = 'digit-float 2.6s ease-in-out infinite';
          el.style.color     = '#fff';
          el.style.opacity   = '1';
        }, i * 28);
      });
    },

    fadeOut() {
      document.getElementById('answer-display').classList.add('fading-out');
    }
  };


  // ══════════════════════════════════════════════════
  //  EXIT BUTTON
  // ══════════════════════════════════════════════════
  const ExitBtn = {
    el: null, timer: null,
    init() {
      this.el = document.getElementById('exit-btn');
      this.el.addEventListener('click', () => {
        if (State.mode !== 'IDLE') {
          // Force-end the reveal
          AnimationEngine._forceEnd();
        }
      });
    },
    show() {
      this.hide(); // clear any previous
      this.timer = setTimeout(() => {
        this.el.classList.add('visible');
      }, 4000);
    },
    hide() {
      clearTimeout(this.timer);
      this.el.classList.remove('visible');
    }
  };

  // ══════════════════════════════════════════════════
  //  MAIN ANIMATION ENGINE
  // ══════════════════════════════════════════════════
  const AnimationEngine = {
    _groupEls: [],

    async triggerReveal(answer, equationStr) {
      State.mode = 'QUESTION';
      State.pendingAnswer = answer;
      this._groupEls = [];
      document.getElementById('achievement-btn').classList.add('anim-hidden');

      Display.blank();

      await Manifest.load();
      let { song, img } = Manifest.pickRandom();

      // ── 67 Easter Egg — exclusive Special/67/ assets, never in the random pool ──
      const fullscreenReveal = is67Easter(answer);
      if (fullscreenReveal) {
        song = { file: 'Special/song6/67-kid-phonk.mp3', beatdrop: 5.0 };
        img  = 'Special/67.gif';
      }

      // Achievement unlock — fires on first appearance of this image
      Achievements.tryUnlock(img);

      // Preload image
      const revealImg = document.getElementById('reveal-image');
      revealImg.style.backgroundImage = '';
      revealImg.classList.remove('visible', 'fading-out', 'fullscreen');
      if (img) {
        const encodedImg = img.split('/').map(p => encodeURIComponent(p)).join('/');
        new Image().src = encodedImg;
        revealImg.style.backgroundImage = "url('" + encodedImg + "')";
        if (fullscreenReveal) revealImg.classList.add('fullscreen');
      }

      // Setup audio
      const audio = document.getElementById('phonk-audio');
      let audioStarted = false;

      if (song) {
        const encodedSrc = song.file.split('/').map(p => encodeURIComponent(p)).join('/');
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
        audio.volume = 1.0;
        audio.src = encodedSrc;

        const tryPlay = () => {
          if (audioStarted) return;
          audioStarted = true;
          // setup() is safe to call every time — it only creates the node graph once
          BeatAnalyser.setup(audio);
          if (BeatAnalyser.ctx && BeatAnalyser.ctx.state === 'suspended') {
            BeatAnalyser.ctx.resume();
          }
          audio.play().catch(err => console.warn('[PhonkCalc] play() blocked:', err));
          BeatAnalyser.start();
        };
        audio.addEventListener('canplay', tryPlay, { once: true });
        setTimeout(tryPlay, 2500);
      }

      const beatdropSec = song ? song.beatdrop : 3.5;
      const beatdropMs  = beatdropSec * 1000;

      // Equation intro = first 2/3 of beatdrop time
      const introDurationMs = beatdropMs * 0.667;
      // Digit reveal = remaining 1/3

      // ── PHASE 1: Equation intro (includes "= ?") ──
      State.mode = 'EQUATION';
      // Append "= ?" to the equation string so it appears as part of the intro
      const equationWithQ = equationStr + ' ?';
      EquationIntro.show(equationWithQ, introDurationMs, () => {
        // ── PHASE 2: Answer sequence ──
        this._startAnswerSequence(answer, song, !!img, beatdropMs, introDurationMs);
      });
    },

    _startAnswerSequence(answer, song, hasImage, beatdropMs, elapsedMs) {
      State.mode = 'REVEALING';

      const remainingMs = beatdropMs - elapsedMs;

      // Treat the full answer as-is (decimals fly in like normal digits)
      const groups     = splitIntoGroups(answer);
      const directions = assignDirections(groups.length);
      const groupEls   = AnswerReveal.buildGroups(groups, directions);
      this._groupEls   = groupEls;

      const layer = document.getElementById('reveal-layer');
      layer.classList.add('active');

      document.body.classList.add('pre-shake');
      Display.showTension(remainingMs / 1000);

      // Ramp up shake before drop
      const preCueMs = Math.max(0, remainingMs - 1400);
      setTimeout(() => {
        document.body.classList.remove('pre-shake');
        document.body.classList.add('pre-intense');
        document.getElementById('vignette').classList.add('intense');
      }, preCueMs);

      // Launch digits now — they fly for the full remaining time and snap on beat
      AnswerReveal.launch(groupEls, remainingMs);

      // ── AT BEAT DROP ──
      setTimeout(() => {
        this._executeDrop(hasImage, groupEls);
      }, remainingMs);

      // Song end → auto-dismiss
      const audio = document.getElementById('phonk-audio');
      audio.addEventListener('ended', () => this._onSongEnded(), { once: true });
      if (!song) setTimeout(() => this._onSongEnded(), remainingMs + 5000);

      // Show exit button after 4s
      ExitBtn.show();
    },

    _executeDrop(hasImage, groupEls) {
      document.body.classList.remove('pre-shake', 'pre-intense');

      // White flash
      const flash = document.getElementById('flash-overlay');
      flash.classList.remove('firing');
      flash.offsetHeight;
      flash.classList.add('firing');

      if (hasImage) {
        document.getElementById('reveal-image').classList.add('visible');
        BeatAnalyser.animateImageEntrance();
      }
      document.getElementById('grey-overlay').classList.add('visible');

      AnswerReveal.activateGlow(groupEls);

      // Mega shake
      setTimeout(() => {
        document.body.classList.remove('mega-shaking');
        document.body.offsetHeight;
        document.body.classList.add('mega-shaking');
        setTimeout(() => document.body.classList.remove('mega-shaking'), 750);
      }, 50);

      // Achievement toast — 1s after beat drop so it doesn't overlap the drop itself
      setTimeout(() => Achievements.flushPendingToast(), 1000);
    },

    _onSongEnded() {
      if (State.mode === 'IDLE') return;
      State.mode = 'ENDING';
      BeatAnalyser.stop();
      ExitBtn.hide();

      AnswerReveal.fadeOut();
      document.getElementById('reveal-image').classList.add('fading-out');
      document.getElementById('grey-overlay').classList.add('fading-out');
      document.getElementById('vignette').classList.remove('intense');
      document.getElementById('achievement-btn').classList.remove('anim-hidden');

      setTimeout(() => this._restoreCalculator(), 1350);
    },

    _forceEnd() {
      const audio = document.getElementById('phonk-audio');
      audio.pause();
      AudioPlayer.fadeOut(audio, 600);
      this._onSongEnded();
    },

    _restoreCalculator() {
      const layer = document.getElementById('reveal-layer');
      layer.classList.remove('active');

      document.getElementById('answer-display').innerHTML = '';
      document.getElementById('answer-display').classList.remove('fading-out');
      document.getElementById('reveal-image').classList.remove('visible','fading-out','fullscreen');
      document.getElementById('reveal-image').style.backgroundImage = '';
      document.getElementById('reveal-image').style.transform = '';
      document.getElementById('grey-overlay').classList.remove('visible','fading-out');
      document.getElementById('vignette').classList.remove('intense');
      document.body.classList.remove('pre-shake','pre-intense','mega-shaking');
      Display.tensionBar.classList.remove('active');
      ExitBtn.hide();

      Display.showResult(State.pendingAnswer);
      State.current          = State.pendingAnswer;
      State.justEvaled       = true;
      State.waitingForOperand = false;
      State.previous         = '';
      State.operator         = null;
      State.pendingAnswer    = null;
      State.mode             = 'IDLE';
    }
  };

  // ══════════════════════════════════════════════════
  //  CALCULATOR LOGIC
  // ══════════════════════════════════════════════════
  function handleButton(action, value) {
    if (State.mode !== 'IDLE') return;

    switch (action) {
      case 'digit':
        if (State.justEvaled || State.waitingForOperand) {
          State.current = value;
          State.justEvaled = false;
          State.waitingForOperand = false;
        } else {
          State.current = State.current === '0' ? value : State.current + value;
        }
        if (State.current.replace('-','').replace('.','').length > 15) return;
        break;

      case 'dot':
        if (State.justEvaled || State.waitingForOperand) {
          State.current = '0.'; State.justEvaled = false; State.waitingForOperand = false;
        } else if (!State.current.includes('.')) {
          State.current += '.';
        }
        break;

      case 'operator':
        // Strip trailing dot ("5." → "5") before using as operand
        if (State.current.endsWith('.')) State.current = State.current.slice(0, -1);
        if (State.operator && !State.waitingForOperand) {
          const r = Engine.compute(State.previous, State.operator, State.current);
          State.previous = r; State.current = r;
        } else {
          State.previous = State.current;
        }
        State.operator = value;
        State.waitingForOperand = true;
        State.justEvaled = false;
        break;

      case 'equals': {
        if (!State.operator) return;
        // Strip trailing dot from both operands before computing
        if (State.current.endsWith('.'))  State.current  = State.current.slice(0, -1);
        if (State.previous.endsWith('.')) State.previous = State.previous.slice(0, -1);
        const a   = State.previous;
        const b   = State.current;
        const sym = opSymbol(State.operator);
        const expr = `${a} ${sym} ${b} =`;
        const result = Engine.compute(a, State.operator, b);
        State.justEvaled = true;
        State.waitingForOperand = false;
        State.previous = '';
        State.operator = null;
        AnimationEngine.triggerReveal(Engine.format(result), expr);
        return;
      }

      case 'clear':
        State.current = '0'; State.previous = '';
        State.operator = null; State.justEvaled = false; State.waitingForOperand = false;
        break;

      case 'backspace':
        if (!State.justEvaled)
          State.current = State.current.length > 1 ? State.current.slice(0,-1) : '0';
        break;

      case 'sign':
        if (State.current !== '0')
          State.current = State.current.startsWith('-') ? State.current.slice(1) : '-' + State.current;
        break;

      case 'percent':
        State.current = (parseFloat(State.current) / 100).toString();
        break;
    }

    let expr = '';
    if (State.operator) expr = State.previous + ' ' + opSymbol(State.operator);
    Display.update(State.current, expr);
  }

  function opSymbol(op) {
    return {'+':'+', '-':'−', '*':'×', '/':'÷'}[op] || op;
  }

  // Returns true when the answer is 67, 6767, 676767, … (repeating 67 sequence)
  function is67Easter(answer) {
    if (!answer || answer === 'ERROR') return false;
    const n = parseFloat(answer);
    if (!isFinite(n) || n !== Math.floor(n)) return false;   // must be a whole number
    return /^-?(67)+$/.test(Math.abs(n).toString());
  }

  // ══════════════════════════════════════════════════
  //  COWBELL PLAYER
  //  Each button maps to a file in Effects/.
  //  To swap a sound: replace the file with the same name.
  //  To add a new button sound: add an entry to FILES below.
  // ══════════════════════════════════════════════════
  const Cowbell = {
    // Maps button key → filename inside Effects/
    // Button key = action for non-digit/operator buttons,
    //              action_value for digit and operator buttons.
    FILES: {
      'digit_0':    '0.wav',
      'digit_1':    '1.wav',
      'digit_2':    '2.wav',
      'digit_3':    '3.wav',
      'digit_4':    '4.wav',
      'digit_5':    '5.wav',
      'digit_6':    '6.wav',
      'digit_7':    '7.wav',
      'digit_8':    '8.wav',
      'digit_9':    '9.wav',
      'operator_+': 'plus.wav',
      'operator_-': 'minus.wav',
      'operator_*': 'multiply.wav',
      'operator_/': 'divide.mp3',
      'equals':     'equals.wav',
      'clear':      '8.wav',       // AC — reuses 8
      'sign':       '3.wav',       // +/- — reuses 3
      'percent':    '6.wav',       // % — reuses 6
      'dot':        '1.wav',       // . — reuses 1
      'backspace':  'minus.wav',   // backspace — reuses minus
    },

    // Pre-loaded Audio objects, keyed by filename
    _cache: {},

    // Pre-load all unique files up front
    preload() {
      const seen = new Set();
      Object.values(this.FILES).forEach(file => {
        if (seen.has(file)) return;
        seen.add(file);
        const audio = new Audio('Effects/' + file);
        audio.preload = 'auto';
        this._cache[file] = audio;
      });
    },

    play(action, value) {
      const key = value !== undefined ? `${action}_${value}` : action;
      const file = this.FILES[key];
      if (!file) return;
      const src = this._cache[file];
      if (!src) return;

      // Ensure AudioContext is alive (button click is a valid user gesture)
      BeatAnalyser.setupCtx();

      // Clone so rapid presses overlap
      const clone = src.cloneNode();
      clone.volume = 1.0;

      if (BeatAnalyser._ctxReady && BeatAnalyser.analyser) {
        try {
          // Route clone through the analyser so the viz reacts to button sounds.
          // Each clone is a distinct element so createMediaElementSource is valid.
          const src_node = BeatAnalyser.ctx.createMediaElementSource(clone);
          const gain     = BeatAnalyser.ctx.createGain();
          gain.gain.value = 1.6; // boost quieter effects to consistent loudness
          src_node.connect(gain);
          gain.connect(BeatAnalyser.analyser);
          // analyser → compressor → destination is already wired; sound plays through.
        } catch(e) {
          // Fallback: play without routing (still audible via clone.volume)
        }
      }

      clone.play().catch(() => {});
    }
  };

  // ══════════════════════════════════════════════════
  //  AUDIO VISUALIZATION
  // ══════════════════════════════════════════════════
  const AudioViz = {
    canvas: null,
    ctx2d:  null,
    phase:  0,
    init() {
      this.canvas = document.getElementById('audio-viz');
      if (!this.canvas) return;
      this.ctx2d = this.canvas.getContext('2d');
      this._resize();
      window.addEventListener('resize', () => this._resize());
      this._loop();
    },

    _resize() {
      const dpr = window.devicePixelRatio || 1;
      const w   = this.canvas.offsetWidth;
      const h   = this.canvas.offsetHeight;
      this.canvas.width  = w * dpr;
      this.canvas.height = h * dpr;
      this.ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
    },

    _loop() {
      this._draw();
      requestAnimationFrame(() => this._loop());
    },

    _draw() {
      const w   = this.canvas.offsetWidth;
      const h   = this.canvas.offsetHeight;
      const ctx = this.ctx2d;
      ctx.clearRect(0, 0, w, h);

      const waveData = BeatAnalyser.analyser
        ? (BeatAnalyser.analyser.getByteTimeDomainData(
             (this._waveBuf = this._waveBuf || new Uint8Array(BeatAnalyser.analyser.fftSize))
           ), this._waveBuf)
        : new Uint8Array(256).fill(128);
      this._drawSpectrum(ctx, w, h, waveData);
    },

    _drawSpectrum(ctx, w, h, waveData) {
      // waveData already read by _draw() — use directly.
      // Also sample frequency bins for bass-driven glow
      const freqData = new Uint8Array(BeatAnalyser.analyser.frequencyBinCount);
      BeatAnalyser.analyser.getByteFrequencyData(freqData);

      // Bass energy (first 8 bins) → 0..1
      let bass = 0;
      for (let i = 0; i < 8; i++) bass += freqData[i];
      bass /= (8 * 255);

      const cy  = h / 2;
      const amp = h * 0.46;   // how tall the waveform can get
      const n   = waveData.length;

      // ── Pass 1: fat glow halo, pulses with bass ──
      ctx.beginPath();
      ctx.strokeStyle = `rgba(130,30,210,${0.09 + bass * 0.24})`;
      ctx.lineWidth   = 10 + bass * 18;
      ctx.lineCap     = 'butt';
      ctx.lineJoin    = 'round';
      for (let i = 0; i < n; i++) {
        const x = (i / (n - 1)) * w;
        const y = cy + ((waveData[i] / 128.0) - 1.0) * amp;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // ── Pass 2: mid glow — orange tint ──
      ctx.beginPath();
      ctx.strokeStyle = `rgba(255,70,0,${0.07 + bass * 0.16})`;
      ctx.lineWidth   = 5 + bass * 8;
      for (let i = 0; i < n; i++) {
        const x = (i / (n - 1)) * w;
        const y = cy + ((waveData[i] / 128.0) - 1.0) * amp;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // ── Pass 3: main waveform line — phonk gradient ──
      const grad = ctx.createLinearGradient(0, 0, w, 0);
      const a0 = 0.78 + bass * 0.22;
      grad.addColorStop(0,    'rgba(130,30,210,0)');
      grad.addColorStop(0.08, `rgba(155,45,235,${a0})`);
      grad.addColorStop(0.38, `rgba(255,75,0,${a0})`);
      grad.addColorStop(0.62, `rgba(255,18,50,${a0})`);
      grad.addColorStop(0.88, `rgba(155,45,235,${a0})`);
      grad.addColorStop(1,    'rgba(130,30,210,0)');

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 2.0 + bass * 2.0;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      for (let i = 0; i < n; i++) {
        const x = (i / (n - 1)) * w;
        const y = cy + ((waveData[i] / 128.0) - 1.0) * amp;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    },

    _drawIdleWave(ctx, w, h) {
      this.phase += 0.028;
      const cy  = h / 2;
      const amp = h * 0.26;

      // Deep glow halo
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(140,40,220,0.14)';
      ctx.lineWidth   = 10;
      ctx.lineCap     = 'butt';
      for (let x = 0; x <= w; x += 2) {
        const y = cy + amp * Math.sin(x * 0.020 + this.phase)
                      * Math.cos(x * 0.007 + this.phase * 0.38);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Main wave — phonk palette: purple → hot-orange → blood-red
      const grad = ctx.createLinearGradient(0, 0, w, 0);
      grad.addColorStop(0,    'rgba(130,30,210,0)');
      grad.addColorStop(0.08, 'rgba(150,40,230,0.75)');
      grad.addColorStop(0.35, 'rgba(255,80,0,0.80)');
      grad.addColorStop(0.60, 'rgba(255,20,50,0.75)');
      grad.addColorStop(0.85, 'rgba(150,40,230,0.70)');
      grad.addColorStop(1,    'rgba(130,30,210,0)');

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 2.2;
      for (let x = 0; x <= w; x++) {
        const y = cy + amp * Math.sin(x * 0.020 + this.phase)
                      * Math.cos(x * 0.007 + this.phase * 0.38);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  };

  // ══════════════════════════════════════════════════
  //  ACHIEVEMENTS
  // ══════════════════════════════════════════════════
  const Achievements = {

    RARITIES: {
      Common:    { label: 'COMMON',    pct: 50   },
      Rare:      { label: 'RARE',      pct: 30   },
      Epic:      { label: 'EPIC',      pct: 15   },
      Legendary: { label: 'LEGENDARY', pct: 5    },
      Special:   { label: 'SPECIAL',   pct: null },
    },

    _config:        {},
    _unlocked:      new Set(),
    _newUnlocks:    new Set(),
    _rarityStorage: {},   // { "img/path": "Rare" } for randomly-assigned rarities
    _pendingToast:  null, // held until 1s after beat drop
    _toastQueue:    [],
    _toastActive:   false,

    _allImages() {
      return [...(window.PHONK_MANIFEST?.images || []), 'Special/67.gif'];
    },

    async _loadConfig() {
      this._config = window.PHONK_ACHIEVEMENTS || {}; // sync fallback
      try {
        const r = await fetch('./achievements.json?v=' + Date.now());
        if (r.ok) this._config = await r.json();
      } catch {}
    },

    init() {
      try { this._unlocked      = new Set(JSON.parse(localStorage.getItem('phonk_ach')         || '[]')); } catch { this._unlocked      = new Set(); }
      try { this._newUnlocks    = new Set(JSON.parse(localStorage.getItem('phonk_ach_new')      || '[]')); } catch { this._newUnlocks    = new Set(); }
      try { this._rarityStorage =         JSON.parse(localStorage.getItem('phonk_ach_rarities') || '{}');  } catch { this._rarityStorage = {};         }
      this._loadConfig();
      this._updateBadge();
      document.getElementById('achievement-btn').addEventListener('click',   () => this.openPanel());
      document.getElementById('achievement-close').addEventListener('click', () => this.closePanel());
      document.getElementById('achievement-panel').addEventListener('click', e => {
        if (e.target.id === 'achievement-panel') this.closePanel();
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && document.getElementById('achievement-panel').classList.contains('open'))
          this.closePanel();
      });
    },

    // ── Rarity ──────────────────────────────────────
    _randomRarity() {
      const r = Math.random() * 100;
      if (r < 50) return 'Common';
      if (r < 80) return 'Rare';
      if (r < 95) return 'Epic';
      return 'Legendary';
    },

    _getRarity(imgPath) {
      return this._config[imgPath]?.rarity || this._rarityStorage[imgPath] || null;
    },

    _assignRarity(imgPath) {
      const cfgRarity = this._config[imgPath]?.rarity;
      if (cfgRarity) return cfgRarity;
      if (!this._rarityStorage[imgPath]) {
        this._rarityStorage[imgPath] = this._randomRarity();
        try { localStorage.setItem('phonk_ach_rarities', JSON.stringify(this._rarityStorage)); } catch {}
      }
      return this._rarityStorage[imgPath];
    },

    // ── Unlock ──────────────────────────────────────
    tryUnlock(imgPath) {
      if (!imgPath || this._unlocked.has(imgPath)) return;
      this._unlocked.add(imgPath);
      this._newUnlocks.add(imgPath);
      this._assignRarity(imgPath);
      this._save();
      this._updateBadge();
      this._pendingToast = imgPath; // shown 1s after beat drop via flushPendingToast()
    },

    flushPendingToast() {
      if (!this._pendingToast) return;
      this._queueToast(this._pendingToast);
      this._pendingToast = null;
    },

    // ── Persistence ─────────────────────────────────
    _save() {
      try {
        localStorage.setItem('phonk_ach',     JSON.stringify([...this._unlocked]));
        localStorage.setItem('phonk_ach_new', JSON.stringify([...this._newUnlocks]));
      } catch {}
    },

    // ── Name ────────────────────────────────────────
    _getName(imgPath) {
      const cfgName = this._config[imgPath]?.name;
      if (cfgName) return cfgName;
      let name = imgPath.split('/').pop().replace(/\.[^.]+$/, '');
      name = name.replace(/-removebg-preview$/i, '').replace(/-preview$/i, '');
      name = name.replace(/^\d+-\d+_/, '').replace(/images\.\w+[-.]?\w*/i, '');
      name = name.replace(/[-_]+/g, ' ').trim();
      return name.replace(/\b\w/g, c => c.toUpperCase()) || '???';
    },

    // ── Toast ───────────────────────────────────────
    _queueToast(imgPath) {
      this._toastQueue.push(imgPath);
      if (!this._toastActive) this._showNextToast();
    },

    _showNextToast() {
      if (!this._toastQueue.length) { this._toastActive = false; return; }
      this._toastActive = true;
      const imgPath    = this._toastQueue.shift();
      const rarity     = this._getRarity(imgPath);
      const rarityData = rarity ? this.RARITIES[rarity] : null;
      const encoded    = imgPath.split('/').map(p => encodeURIComponent(p)).join('/');

      document.getElementById('toast-img').style.backgroundImage = `url('${encoded}')`;
      document.getElementById('toast-name').textContent = this._getName(imgPath);
      const rarityEl = document.getElementById('toast-rarity');
      rarityEl.className = 'rarity-' + (rarity || 'common').toLowerCase();
      rarityEl.textContent = rarityData ? `⬡ ${rarityData.label}` : '';

      const toast = document.getElementById('achievement-toast');
      toast.classList.add('visible');
      setTimeout(() => {
        toast.classList.remove('visible');
        setTimeout(() => this._showNextToast(), 500);
      }, 4000);
    },

    // ── Badge ───────────────────────────────────────
    _updateBadge() {
      const badge = document.getElementById('achievement-badge');
      const n = this._newUnlocks.size;
      badge.textContent = n;
      badge.classList.toggle('hidden', n === 0);
    },

    // ── Panel ───────────────────────────────────────
    openPanel() {
      const newSet = new Set(this._newUnlocks);
      this._buildGrid(newSet);
      document.getElementById('achievement-panel').classList.add('open');
      this._newUnlocks.clear();
      this._save();
      this._updateBadge();
    },

    closePanel() {
      document.getElementById('achievement-panel').classList.remove('open');
    },

    _buildGrid(newSet) {
      const imgs = this._allImages();
      const unlockedCount = imgs.filter(p => this._unlocked.has(p)).length;
      document.getElementById('achievement-count').textContent = `${unlockedCount} / ${imgs.length}`;
      const grid = document.getElementById('achievement-grid');
      grid.innerHTML = '';

      const RARITY_ORDER = { Common: 0, Rare: 1, Epic: 2, Legendary: 3, Special: 4 };
      const CAT_ORDER = ['Skulls', 'Trollfaces', 'Emojis', 'Sigmas', 'Babies', 'Misc', 'Special'];

      // Group images by category
      const groups = {};
      CAT_ORDER.forEach(c => { groups[c] = []; });
      imgs.forEach(imgPath => {
        const cat = this._config[imgPath]?.category || 'Misc';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(imgPath);
      });

      // Sort each group least rare → most rare
      Object.values(groups).forEach(arr => {
        arr.sort((a, b) => {
          const ra = this._config[a]?.rarity || this._rarityStorage[a] || 'Common';
          const rb = this._config[b]?.rarity || this._rarityStorage[b] || 'Common';
          return (RARITY_ORDER[ra] ?? 0) - (RARITY_ORDER[rb] ?? 0);
        });
      });

      const makeCard = (imgPath) => {
        const isUnlocked = this._unlocked.has(imgPath);
        const isNew      = newSet.has(imgPath);

        const cfgRarity    = this._config[imgPath]?.rarity || null;
        const storedRarity = isUnlocked ? (this._rarityStorage[imgPath] || null) : null;
        const rarity       = cfgRarity || storedRarity;
        const rarityKey    = rarity ? rarity.toLowerCase() : null;
        const rarityData   = rarity ? this.RARITIES[rarity] : null;

        const card = document.createElement('div');
        card.className = 'ach-card'
          + (isUnlocked ? ' unlocked'           : '')
          + (isNew      ? ' is-new'              : '')
          + (rarityKey  ? ` rarity-${rarityKey}` : '');

        if (isNew) {
          const b = document.createElement('span');
          b.className = 'ach-new-badge';
          b.textContent = 'NEW';
          card.appendChild(b);
        }

        if (isUnlocked) {
          const encoded = imgPath.split('/').map(p => encodeURIComponent(p)).join('/');
          const imgDiv = document.createElement('div');
          imgDiv.className = 'ach-card-img';
          imgDiv.style.backgroundImage = `url('${encoded}')`;
          card.appendChild(imgDiv);
        } else {
          const lock = document.createElement('div');
          lock.className = 'ach-card-locked';
          lock.textContent = '🔒';
          card.appendChild(lock);
        }

        const nameDiv = document.createElement('div');
        nameDiv.className = 'ach-card-name';
        nameDiv.textContent = isUnlocked ? this._getName(imgPath) : '???';
        card.appendChild(nameDiv);

        const rarityDiv = document.createElement('div');
        rarityDiv.className = 'ach-rarity' + (rarityKey ? ` rarity-${rarityKey}` : '');
        if (rarityData) {
          const pct = rarityData.pct !== null ? ` · ${rarityData.pct}%` : '';
          rarityDiv.textContent = `⬡ ${rarityData.label}${pct}`;
        } else {
          rarityDiv.textContent = '⬡ ???';
          rarityDiv.style.color = 'rgba(255,255,255,0.18)';
        }
        card.appendChild(rarityDiv);
        return card;
      };

      CAT_ORDER.forEach(cat => {
        const group = groups[cat];
        if (!group || group.length === 0) return;

        const header = document.createElement('div');
        header.className = 'ach-category-header';
        header.textContent = cat;
        grid.appendChild(header);

        group.forEach(imgPath => grid.appendChild(makeCard(imgPath)));
      });
    }
  };

  // ══════════════════════════════════════════════════
  //  EVENTS
  // ══════════════════════════════════════════════════
  document.getElementById('buttons').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    Cowbell.play(btn.dataset.action, btn.dataset.value);
    handleButton(btn.dataset.action, btn.dataset.value);
  });

  document.addEventListener('keydown', e => {
    if (State.mode !== 'IDLE') return;
    if ('0123456789'.includes(e.key)) {
      e.preventDefault();
      Cowbell.play('digit', e.key);
      handleButton('digit', e.key);
      return;
    }
    switch (e.key) {
      case '.':         e.preventDefault(); Cowbell.play('dot');             handleButton('dot');            break;
      case '+':         e.preventDefault(); Cowbell.play('operator','+');   handleButton('operator','+');   break;
      case '-':         e.preventDefault(); Cowbell.play('operator','-');   handleButton('operator','-');   break;
      case '*':         e.preventDefault(); Cowbell.play('operator','*');   handleButton('operator','*');   break;
      case '/':         e.preventDefault(); Cowbell.play('operator','/');   handleButton('operator','/');   break;
      case 'Enter': case '=': e.preventDefault(); Cowbell.play('equals');   handleButton('equals');         break;
      case 'Backspace': e.preventDefault(); Cowbell.play('backspace');      handleButton('backspace');      break;
      case 'Escape': case 'Delete': e.preventDefault(); Cowbell.play('clear'); handleButton('clear');       break;
    }
  });

  // ══════════════════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════════════════
  Display.init();
  ExitBtn.init();
  Achievements.init();
  Cowbell.preload();
  Display.update('0','');
  Manifest.load();
  BeatAnalyser.setupCtx(); // create AudioContext immediately so viz is live from the start
  AudioViz.init();
  </script>
</body>
</html>
